name: Stormcore Platform Continuous Deployment Protocol

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Source Code Streams
      uses: actions/checkout@v4

    - name: Initialize Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.11'

    - name: Install Architecture Dependancy Packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Structural Syntax Checks
      run: |
        # Ensure critical app routing scripts contain valid syntax layouts
        python -m py_compile app.py

  deploy-to-vercel:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Clone Source Code Streams
      uses: actions/checkout@v4

    - name: Push Deployment Trigger to Vercel Infrastructure
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
